<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

    <style>
        html, body, #map {
          height: 100%;
          margin: 0;
          padding: 0;
        }
        .leaflet-popup-content {
          font-family: sans-serif;
          line-height: 1.4;
        }
        .leaflet-popup-content b {
          font-size: 16px;
        }
        .leaflet-popup-content a {
          color: #007BFF;
          text-decoration: none;
        }
    </style>
</head>
<body>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- MarkerCluster JS -->
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
    // Δημιουργία χάρτη
    var map = L.map('map').setView([37.9838, 23.7275], 7);

    // Φόρτωση πλακιδίων OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Δημιουργία "cluster group"
    var markers = L.markerClusterGroup({
      showCoverageOnHover: false,
      maxClusterRadius: 60, // πόσο κοντά πρέπει να είναι τα pins για να ενωθούν
    });

    // Συνάρτηση για προσθήκη markers από το Android
    function addDoctorMarker(lat, lon, name, specialty, address, email, phone) {
      var popupText = `
        <b>${name}</b><br>
        <i>${specialty}</i><br>
        📍 ${address}<br>
        📧 <a href="mailto:${email}">${email}</a><br>
        ☎️ <a href="tel:${phone}">${phone}</a>
      `;

      var marker = L.marker([lat, lon]).bindPopup(popupText);
      markers.addLayer(marker);
    }

    // Συνάρτηση για εμφάνιση όλων
    function fitToMarkers() {
      if (markers.getLayers().length > 0) {
        map.addLayer(markers);
        map.fitBounds(markers.getBounds(), { padding: [50, 50] });
      }
    }
</script>
</body>
</html>
